services:
  ollama:
    image: ollama/ollama:latest
    container_name: sweng889-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  python-app:
    build: .
    container_name: sweng889-module2-python
    depends_on:
      - ollama
    environment:
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:1b
    command: python app.py

volumes:
  ollama_data: